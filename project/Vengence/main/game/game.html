<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link type="icon" href="assets/sprites/placeholderPlayer.gif">
    <link rel="stylesheet" href="style/gameMainStyle.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js" defer></script>
    <script src="script/enemyAI.js" defer></script>
    <script src="script/phaserMain.js" defer></script>
</head>

<body>
    <div id="coordinateDisplay">0, 0</div>
    <div id="game"></div>
    <audio id="backgroundMusic" src="assets/sounds/music/dungeon-background.mp3" loop></audio>
    <div id="settings">
        <div class="optionsContainer">
            <h2>Settings</h2>

            <div class="option">
                <label>Master Volume</label>
                <div class="sliderRow">
                    <span class="value">80%</span>
                    <input type="range" min="0" max="100" value="100">
                </div>
            </div>

            <div class="option">
                <label>Music Volume</label>
                <div class="sliderRow">
                    <span class="value">80%</span>
                    <input type="range" min="0" max="100" value="80">
                </div>
            </div>

            <div class="option">
                <label>Effects Volume</label>
                <div class="sliderRow">
                    <span class="value">80%</span>
                    <input type="range" min="0" max="100" value="60">
                </div>
            </div>

            <div class="option toggle">
                <label>VFX</label>
                <input type="checkbox" checked>
            </div>

            <div class="option toggle">
                <label>UI</label>
                <input type="checkbox" checked>
            </div>
            <button onclick="goTo('start')">Back</button>
        </div>
    </div>
    </div>
    <div id="skills"></div>
</body>

</html>
