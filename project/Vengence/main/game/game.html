<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link type="icon" href="assets/sprites/placeholderPlayer.gif">
    <link rel="stylesheet" href="style/gameMainStyle.css">
    <script>
        function applyVolumeSettings() {
            const masterVol = (localStorage.getItem('masterVolume') || 80) / 100;
            const musicVol = (localStorage.getItem('musicVolume') || 80) / 100;
            const effectsVol = (localStorage.getItem('effectsVolume') || 60) / 100;

            const backgroundMusic = document.getElementById('backgroundMusic');
            const attackSound = document.getElementById('attackSound');

            if (backgroundMusic) backgroundMusic.volume = masterVol * musicVol;
            if (attackSound) attackSound.volume = masterVol * effectsVol;
        }
        let gameMusicStarted = false;
        function startGameMusic() {
            if (!gameMusicStarted) {
                gameMusicStarted = true;
                const backgroundMusic = document.getElementById('backgroundMusic');
                if (backgroundMusic) {
                    backgroundMusic.play().catch(() => {});
                }
                document.removeEventListener('click', startGameMusic);
                document.removeEventListener('keydown', startGameMusic);
            }
        }
        document.addEventListener('click', startGameMusic);
        document.addEventListener('keydown', startGameMusic);
        
        window.startGameMusic = startGameMusic;
        window.gameMusicStarted = () => gameMusicStarted;

        window.addEventListener('storage', applyVolumeSettings);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js" defer></script>
    <script src="script/debug.js" defer></script>
    <script src="script/enemyAI.js" defer></script>
    <script src="script/phaserMain.js" defer></script>
</head>

<body>
    <button id="reset-button" type="button" onclick="restartGame()">Reset</button>
    <div id="game"></div>
    <audio id="attackSound" src="assets/sounds/effects/slash.mp3" preload="auto"></audio>
    <audio id="backgroundMusic" src="assets/sounds/music/dungeon-background.mp3" loop></audio>
    <script>
        applyVolumeSettings();
    </script>
    <div id="settings">
        <div class="optionsContainer">
            <h2>Settings</h2>

            <div class="option">
                <label>Master Volume</label>
                <div class="sliderRow">
                    <span class="value">80%</span>
                    <input type="range" min="0" max="100" value="100">
                </div>
            </div>

            <div class="option">
                <label>Music Volume</label>
                <div class="sliderRow">
                    <span class="value">80%</span>
                    <input type="range" min="0" max="100" value="80">
                </div>
            </div>

            <div class="option">
                <label>Effects Volume</label>
                <div class="sliderRow">
                    <span class="value">80%</span>
                    <input type="range" min="0" max="100" value="60">
                </div>
            </div>

            <div class="option toggle">
                <label>VFX</label>
                <input type="checkbox" checked>
            </div>

            <div class="option toggle">
                <label>UI</label>
                <input type="checkbox" checked>
            </div>
            <button onclick="goTo('start')">Back</button>
        </div>
    </div>
    </div>
    <div id="skills"></div>
    <div id="ability-ui">
        <div id="ability-fill"></div>
        <div id="ability-label">Attack</div>
    </div>
</body>

</html>
